<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-adsy.png">
<title>Produk — Ads Dashboard GMV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
</head>
<body>
<div class="app-wrap">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <div class="page-content">

      <div class="page-header">
        <div>
          <h2>📦 Produk</h2>
          <p>Kelola daftar produk TikTok kamu</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="syncDataIklan()" id="btn-sync">🔄 Sync Data Iklan</button>
        <button class="btn btn-primary-sm" onclick="openModal()">+ Tambah Produk</button>
      </div>

      <div class="card">
        <div id="produk-list">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Tambah/Edit Produk -->
<div class="modal-overlay" id="modal-produk">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-produk-title">Tambah Produk</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>Nama Produk</label>
      <input type="text" id="p-nama" placeholder="cth: PrimaGold 4 Box" />
    </div>
    <div class="field">
      <label>Product ID TikTok</label>
      <input type="text" id="p-prodid" placeholder="cth: 1729818964614415510" />
    </div>
    <div class="field">
      <label>Keterangan (opsional)</label>
      <input type="text" id="p-ket" placeholder="cth: Susu kambing etawa 4 box" />
    </div>
    <div class="field">
      <label>Target ROAS per Zona</label>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;background:#d1fae5;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;font-weight:700;color:#065f46;margin-bottom:6px">🟢 BAGUS (Scale)</div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:#065f46">≥</span>
            <input type="number" id="p-roas-high" step="0.1" min="0" placeholder="3" style="width:100%;background:#fff;border:1px solid #a7f3d0;border-radius:6px;padding:5px 8px;font-size:13px;font-weight:600" />
            <span style="font-size:11px;color:#065f46">x</span>
          </div>
        </div>
        <div style="flex:1;background:#fef3c7;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;font-weight:700;color:#92400e;margin-bottom:6px">🟡 MONITOR</div>
          <div style="font-size:11px;color:#92400e;padding:5px 0">antara keduanya</div>
        </div>
        <div style="flex:1;background:#fee2e2;border-radius:8px;padding:10px 12px">
          <div style="font-size:10px;font-weight:700;color:#991b1b;margin-bottom:6px">🔴 KILL</div>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:#991b1b">&lt;</span>
            <input type="number" id="p-roas-mid" step="0.1" min="0" placeholder="1.5" style="width:100%;background:#fff;border:1px solid #fca5a5;border-radius:6px;padding:5px 8px;font-size:13px;font-weight:600" />
            <span style="font-size:11px;color:#991b1b">x</span>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:#94a3b8">Kosongkan untuk pakai default (Bagus ≥3x, Kill &lt;1.5x)</div>
    </div>
    <div class="auth-err" id="modal-err"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary-sm" id="btn-save-produk" onclick="saveProduk()">Simpan</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/produk.js"></script>
</body>
</html>
