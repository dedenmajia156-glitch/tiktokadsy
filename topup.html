<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-adsy.png">
<title>Top Up — Ads Dashboard GMV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<style>
  /* Tabs */
  .topup-tabs { display:flex; gap:4px; background:#f1f5f9; border-radius:12px; padding:4px; width:fit-content; margin-bottom:24px; }
  .topup-tab { padding:8px 20px; border-radius:9px; border:none; background:transparent; font-size:13px; font-weight:600; color:#64748b; cursor:pointer; transition:all .2s; }
  .topup-tab.active { background:#fff; color:var(--primary); box-shadow:0 1px 4px rgba(0,0,0,0.08); }

  /* Upload area */
  .ss-drop {
    border:2px dashed #c7d2fe;
    border-radius:12px;
    padding:32px 20px;
    text-align:center;
    cursor:pointer;
    transition:all .2s;
    background:#fafbff;
    position:relative;
  }
  .ss-drop:hover, .ss-drop.drag-over {
    border-color:var(--primary);
    background:#f0f2ff;
  }
  .ss-placeholder {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#94a3b8;
  }
  .ss-placeholder .upload-icon { font-size:36px; }
  .ss-placeholder .upload-hint { font-size:13px; }
  .ss-placeholder .upload-sub { font-size:11px; color:#cbd5e1; }
  #ss-preview { width:100%; max-height:300px; object-fit:contain; border-radius:8px; margin-top:8px; display:none; }
  #ss-filename { font-size:11px; color:#64748b; margin-top:6px; }

  /* Nominal input */
  .nominal-wrap { position:relative; }
  .nominal-wrap .prefix { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#64748b; font-weight:600; font-size:14px; }
  .nominal-wrap input { padding-left:40px; font-size:18px; font-weight:700; }

  /* Info chips */
  .info-chip {
    background:#f1f5f9;
    border-radius:20px;
    padding:4px 12px;
    font-size:12px;
    color:#475569;
    font-weight:500;
  }
  .info-chip.roas-high { background:#d1fae5; color:#065f46; }
  .info-chip.roas-mid  { background:#fef3c7; color:#92400e; }
  .info-chip.roas-low  { background:#fee2e2; color:#991b1b; }

  .mb-12 { margin-bottom:12px; }
  .badge-orange { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
</style>
</head>
<body>
<div class="app-wrap">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <div class="page-content">

      <div class="page-header">
        <div>
          <h2>💳 Top Up Budget</h2>
          <p>Request top up budget TikTok GMV Max Ads</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="topup-tabs">
        <button class="topup-tab active" data-tab="request" onclick="switchTab('request')">Request Top Up</button>
        <button class="topup-tab" data-tab="riwayat" onclick="switchTab('riwayat')">Riwayat</button>
      </div>

      <!-- Panel: Request -->
      <div id="panel-request" class="topup-panel" style="max-width:520px">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Request Top Up</div>
          </div>

          <!-- Nominal -->
          <div class="field">
            <label>Nominal Top Up</label>
            <div class="nominal-wrap">
              <span class="prefix">Rp</span>
              <input type="text" id="tp-nominal" placeholder="0" inputmode="numeric"
                oninput="formatNominalInput(this)" />
            </div>
          </div>

          <!-- Screenshot -->
          <div class="field">
            <label>Screenshot TikTok Ads</label>
            <div class="ss-drop" id="ss-drop">
              <div class="ss-placeholder" id="ss-placeholder">
                <div class="upload-icon">📸</div>
                <div class="upload-hint">Klik atau drag & drop screenshot TikTok Ads Manager di sini</div>
                <div class="upload-sub">PNG / JPG / WEBP · Maks 4MB</div>
              </div>
              <img id="ss-preview" src="" alt="Preview" />
            </div>
            <div id="ss-filename"></div>
            <input type="file" id="ss-input" accept="image/*" style="display:none" />
          </div>

          <div class="auth-err" id="tp-err"></div>

          <button class="btn btn-primary-sm" id="tp-submit" onclick="submitTopup()" style="width:100%;margin-top:8px;padding:14px">
            Submit Request
          </button>
        </div>

        <div id="tp-success"></div>
      </div>

      <!-- Panel: Riwayat -->
      <div id="panel-riwayat" class="topup-panel" style="display:none">
        <div id="history-list">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/topup.js"></script>
</body>
</html>
