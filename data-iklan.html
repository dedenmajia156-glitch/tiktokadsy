<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/logo-adsy.png">
<title>Data Iklan — Ads Dashboard GMV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/adv-switcher.js"></script>
</head>
<body>
<div class="app-wrap">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <div class="page-content">

      <div class="page-header">
        <div>
          <h2>📥 Data Iklan</h2>
          <p>Upload data export TikTok GMV Max dan lihat semua data iklan</p>
        </div>
        <button class="btn btn-primary-sm" onclick="openUploadModal()">📤 Upload Excel</button>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <label>Bulan:</label>
        <select id="fil-bulan"><option value="">Semua Bulan</option></select>
        <label>Produk:</label>
        <select id="fil-produk"><option value="">Semua Produk</option></select>
        <label>Creative:</label>
        <select id="fil-creative">
          <option value="">Semua</option>
          <option value="Video">Video</option>
          <option value="Kartu produk">Kartu Produk</option>
        </select>
        <input type="text" id="fil-search" placeholder="🔍 Cari video / akun..." style="width:200px" />
        <label>Per halaman:</label>
        <select id="fil-perpage">
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title" id="data-count">Memuat data...</div>
          <button class="btn btn-danger btn-sm" id="btn-hapus-filter" onclick="hapusDataFilter()" style="display:none">🗑 Hapus Data Bulan Ini</button>
        </div>
        <div id="data-table">
          <div class="loader"><div class="spinner"></div></div>
        </div>
        <div id="pagination" style="display:none;padding:14px 16px;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div id="page-info" style="font-size:13px;color:#64748b"></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-sm" id="btn-prev" onclick="changePage(-1)">← Prev</button>
            <div id="page-nums" style="display:flex;gap:4px"></div>
            <button class="btn btn-outline btn-sm" id="btn-next" onclick="changePage(1)">Next →</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Upload -->
<div class="modal-overlay" id="modal-upload">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title">📤 Upload Data Iklan</div>
      <button class="modal-close" onclick="closeUpload()">✕</button>
    </div>

    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📊</div>
      <h3>Klik atau drag file Excel di sini</h3>
      <p>File export dari TikTok Seller Center (.xlsx)</p>
      <p style="margin-top:8px;font-size:12px;color:#94a3b8">Produk & bulan otomatis terbaca dari file</p>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">

    <div id="preview-info" style="display:none;margin-top:12px">
      <div class="card" style="padding:14px;background:#f8f9ff;box-shadow:none;border:1.5px solid #e0e7ff">
        <div id="preview-text" style="font-size:13px"></div>
      </div>
    </div>

    <div class="auth-err" id="upload-err"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeUpload()">Batal</button>
      <button class="btn btn-primary-sm" id="btn-upload" onclick="doUpload()" disabled>Upload Data</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/data-iklan.js"></script>
</body>
</html>
